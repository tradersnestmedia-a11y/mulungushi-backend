# Frontend Static Site
- type: web
  name: mulungushi-frontend
  runtime: static
  buildCommand: echo "Static site - no build needed"
  staticPublishPath: ./frontend
  headers:
    - path: /*
      name: Cache-Control
      value: no-cache
  routes:
    - type: rewrite
      source: /*
      destination: /index.html

# Backend API Service
- type: web
  name: mulungushi-backend-api
  runtime: node
  plan: free
  buildCommand: npm install
  startCommand: npm start
  envVars:
    - key: DATABASE_URL
      value: postgresql://mulungushi_user:dPiadrfHI5A0YxpAvHXru6FZ4Zi3iVth@dpg-d7r1d0l7vvec73e2nfmg-a.oregon-postgres.render.com/mulungushi_db
    - key: PORT
      value: 3000
    - key: NODE_VERSION
      value: 18
